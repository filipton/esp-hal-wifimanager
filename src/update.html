<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA Firmware Update</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --hover: #f1f5f9;
            --success: #16a34a;
            --error: #dc2626;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: clamp(1rem, 5vw, 2rem);
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        .page-title {
            font-size: 1.375rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title svg {
            color: var(--primary);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .card-header {
            padding: 0.875rem 1.125rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }

        .card-body {
            padding: 1.125rem;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        /* File drop zone */
        .drop-zone {
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.625rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--hover);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .drop-label {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 500;
            text-align: center;
        }

        .drop-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* File selected state */
        .file-selected {
            background: var(--hover);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .file-selected.visible {
            display: flex;
        }

        .file-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--primary);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .file-clear {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
            align-items: center;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
        }

        .file-clear:hover {
            color: var(--error);
            background: #fee2e2;
        }

        /* Progress */
        .progress-wrap {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        .progress-wrap.visible {
            display: flex;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--hover);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .progress-pct {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
        }

        /* Status banner */
        .status-banner {
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .status-banner.info {
            background: var(--hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .status-banner.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status-banner.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .status-banner.info .status-dot {
            background: var(--text-muted);
        }

        .status-banner.success .status-dot {
            background: var(--success);
        }

        .status-banner.error .status-dot {
            background: var(--error);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.7rem 1rem;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(0.99);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.7rem 1rem;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: var(--hover);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="page-title">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                    clip-rule="evenodd" />
            </svg>
            Firmware Update
        </h1>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Firmware File</span>
            </div>
            <div class="card-body">
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="firmwareFile" accept=".bin">
                    <div class="drop-icon">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <span class="drop-label">Choose file or drag here</span>
                    <span class="drop-hint">.bin files only</span>
                </div>

                <div class="file-selected" id="fileSelected">
                    <div class="file-icon">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="file-info">
                        <div class="file-name" id="fileName">—</div>
                        <div class="file-meta" id="fileMeta">—</div>
                    </div>
                    <button class="file-clear" id="fileClear" title="Remove file">
                        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>

                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-row">
                        <span class="progress-label" id="progressText">Uploading…</span>
                        <span class="progress-pct" id="progressPct">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>

                <div class="status-banner info" id="status">
                    <span class="status-dot"></span>
                    <span id="statusText">Select a firmware file (.bin) to begin.</span>
                </div>

                <button class="btn-primary" id="uploadBtn" onclick="uploadFirmware()">Upload and Update</button>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <a href="/" class="btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                            clip-rule="evenodd" />
                    </svg>
                    Back to WiFi Setup
                </a>
            </div>
        </div>
    </div>

    <script>
        const CRC_32_TAB = [
            0x00000000, 0x77073096, 0xee0e612c, 0x990951ba, 0x076dc419, 0x706af48f, 0xe963a535, 0x9e6495a3,
            0x0edb8832, 0x79dcb8a4, 0xe0d5e91e, 0x97d2d988, 0x09b64c2b, 0x7eb17cbd, 0xe7b82d07, 0x90bf1d91,
            0x1db71064, 0x6ab020f2, 0xf3b97148, 0x84be41de, 0x1adad47d, 0x6ddde4eb, 0xf4d4b551, 0x83d385c7,
            0x136c9856, 0x646ba8c0, 0xfd62f97a, 0x8a65c9ec, 0x14015c4f, 0x63066cd9, 0xfa0f3d63, 0x8d080df5,
            0x3b6e20c8, 0x4c69105e, 0xd56041e4, 0xa2677172, 0x3c03e4d1, 0x4b04d447, 0xd20d85fd, 0xa50ab56b,
            0x35b5a8fa, 0x42b2986c, 0xdbbbc9d6, 0xacbcf940, 0x32d86ce3, 0x45df5c75, 0xdcd60dcf, 0xabd13d59,
            0x26d930ac, 0x51de003a, 0xc8d75180, 0xbfd06116, 0x21b4f4b5, 0x56b3c423, 0xcfba9599, 0xb8bda50f,
            0x2802b89e, 0x5f058808, 0xc60cd9b2, 0xb10be924, 0x2f6f7c87, 0x58684c11, 0xc1611dab, 0xb6662d3d,
            0x76dc4190, 0x01db7106, 0x98d220bc, 0xefd5102a, 0x71b18589, 0x06b6b51f, 0x9fbfe4a5, 0xe8b8d433,
            0x7807c9a2, 0x0f00f934, 0x9609a88e, 0xe10e9818, 0x7f6a0dbb, 0x086d3d2d, 0x91646c97, 0xe6635c01,
            0x6b6b51f4, 0x1c6c6162, 0x856530d8, 0xf262004e, 0x6c0695ed, 0x1b01a57b, 0x8208f4c1, 0xf50fc457,
            0x65b0d9c6, 0x12b7e950, 0x8bbeb8ea, 0xfcb9887c, 0x62dd1ddf, 0x15da2d49, 0x8cd37cf3, 0xfbd44c65,
            0x4db26158, 0x3ab551ce, 0xa3bc0074, 0xd4bb30e2, 0x4adfa541, 0x3dd895d7, 0xa4d1c46d, 0xd3d6f4fb,
            0x4369e96a, 0x346ed9fc, 0xad678846, 0xda60b8d0, 0x44042d73, 0x33031de5, 0xaa0a4c5f, 0xdd0d7cc9,
            0x5005713c, 0x270241aa, 0xbe0b1010, 0xc90c2086, 0x5768b525, 0x206f85b3, 0xb966d409, 0xce61e49f,
            0x5edef90e, 0x29d9c998, 0xb0d09822, 0xc7d7a8b4, 0x59b33d17, 0x2eb40d81, 0xb7bd5c3b, 0xc0ba6cad,
            0xedb88320, 0x9abfb3b6, 0x03b6e20c, 0x74b1d29a, 0xead54739, 0x9dd277af, 0x04db2615, 0x73dc1683,
            0xe3630b12, 0x94643b84, 0x0d6d6a3e, 0x7a6a5aa8, 0xe40ecf0b, 0x9309ff9d, 0x0a00ae27, 0x7d079eb1,
            0xf00f9344, 0x8708a3d2, 0x1e01f268, 0x6906c2fe, 0xf762575d, 0x806567cb, 0x196c3671, 0x6e6b06e7,
            0xfed41b76, 0x89d32be0, 0x10da7a5a, 0x67dd4acc, 0xf9b9df6f, 0x8ebeeff9, 0x17b7be43, 0x60b08ed5,
            0xd6d6a3e8, 0xa1d1937e, 0x38d8c2c4, 0x4fdff252, 0xd1bb67f1, 0xa6bc5767, 0x3fb506dd, 0x48b2364b,
            0xd80d2bda, 0xaf0a1b4c, 0x36034af6, 0x41047a60, 0xdf60efc3, 0xa867df55, 0x316e8eef, 0x4669be79,
            0xcb61b38c, 0xbc66831a, 0x256fd2a0, 0x5268e236, 0xcc0c7795, 0xbb0b4703, 0x220216b9, 0x5505262f,
            0xc5ba3bbe, 0xb2bd0b28, 0x2bb45a92, 0x5cb36a04, 0xc2d7ffa7, 0xb5d0cf31, 0x2cd99e8b, 0x5bdeae1d,
            0x9b64c2b0, 0xec63f226, 0x756aa39c, 0x026d930a, 0x9c0906a9, 0xeb0e363f, 0x72076785, 0x05005713,
            0x95bf4a82, 0xe2b87a14, 0x7bb12bae, 0x0cb61b38, 0x92d28e9b, 0xe5d5be0d, 0x7cdcefb7, 0x0bdbdf21,
            0x86d3d2d4, 0xf1d4e242, 0x68ddb3f8, 0x1fda836e, 0x81be16cd, 0xf6b9265b, 0x6fb077e1, 0x18b74777,
            0x88085ae6, 0xff0f6a70, 0x66063bca, 0x11010b5c, 0x8f659eff, 0xf862ae69, 0x616bffd3, 0x166ccf45,
            0xa00ae278, 0xd70dd2ee, 0x4e048354, 0x3903b3c2, 0xa7672661, 0xd06016f7, 0x4969474d, 0x3e6e77db,
            0xaed16a4a, 0xd9d65adc, 0x40df0b66, 0x37d83bf0, 0xa9bcae53, 0xdebb9ec5, 0x47b2cf7f, 0x30b5ffe9,
            0xbdbdf21c, 0xcabac28a, 0x53b39330, 0x24b4a3a6, 0xbad03605, 0xcdd70693, 0x54de5729, 0x23d967bf,
            0xb3667a2e, 0xc4614ab8, 0x5d681b02, 0x2a6f2b94, 0xb40bbe37, 0xc30c8ea1, 0x5a05df1b, 0x2d02ef8d,
        ];

        function calc_crc32(buf, initialCrc) {
            let crc = ~initialCrc;
            for (let i = 0; i < buf.length; i++) {
                crc = CRC_32_TAB[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
            }
            return (~crc) >>> 0;
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        const fileInput = document.getElementById('firmwareFile');
        const dropZone = document.getElementById('dropZone');
        const fileSelected = document.getElementById('fileSelected');
        const fileName = document.getElementById('fileName');
        const fileMeta = document.getElementById('fileMeta');
        const fileClear = document.getElementById('fileClear');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const progressPct = document.getElementById('progressPct');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const uploadBtn = document.getElementById('uploadBtn');

        function setStatus(type, msg) {
            statusDiv.className = 'status-banner ' + type;
            statusDiv.querySelector('.status-dot').className = 'status-dot';
            statusText.textContent = msg;
        }

        function showFile(file) {
            fileName.textContent = file.name;
            fileMeta.textContent = formatBytes(file.size);
            fileSelected.classList.add('visible');
            setStatus('info', 'Ready to upload. Press the button below to start.');
        }

        function clearFile() {
            fileInput.value = '';
            fileSelected.classList.remove('visible');
            progressWrap.classList.remove('visible');
            setStatus('info', 'Select a firmware file (.bin) to begin.');
        }

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) showFile(fileInput.files[0]);
        });

        fileClear.addEventListener('click', clearFile);

        dropZone.addEventListener('dragover', (e) => {e.preventDefault(); dropZone.classList.add('drag-over');});
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const f = e.dataTransfer.files[0];
            if (f) {fileInput.files = e.dataTransfer.files; showFile(f);}
        });

        function updateProgress(percent, text) {
            progressWrap.classList.add('visible');
            progressBar.style.width = percent + '%';
            progressPct.textContent = Math.round(percent) + '%';
            if (text) progressText.textContent = text;
        }

        async function uploadFirmware() {
            const file = fileInput.files[0];
            if (!file) {
                setStatus('error', 'Please select a firmware file first.');
                return;
            }

            uploadBtn.disabled = true;
            setStatus('info', 'Reading file…');
            progressWrap.classList.remove('visible');

            let updateComplete = false;
            let finalMessage = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const byteArray = new Uint8Array(arrayBuffer);
                const fileCrc = calc_crc32(byteArray, 0x0);

                fileMeta.textContent = `${formatBytes(byteArray.length)} · CRC 0x${fileCrc.toString(16).toUpperCase()}`;
                setStatus('info', 'Uploading firmware…');
                updateProgress(0, 'Starting upload…');

                const response = await fetch(`/update?size=${byteArray.length}&crc=${fileCrc}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/octet-stream'},
                    body: byteArray
                });

                if (!response.ok) throw new Error(`Server returned ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    const lines = decoder.decode(value, {stream: true}).split('\n');
                    for (const line of lines) {
                        if (line.startsWith('PROGRESS:')) {
                            const [recv, total] = line.substring(9).split(',').map(Number);
                            updateProgress((recv / total) * 100, `${formatBytes(recv)} of ${formatBytes(total)}`);
                        } else if (line.startsWith('DONE:')) {
                            updateComplete = true;
                            finalMessage = line.substring(5);
                        } else if (line.trim()) {
                            finalMessage = line;
                        }
                    }
                }

                if (updateComplete) {
                    updateProgress(100, 'Upload complete');
                    setStatus('success', finalMessage || 'Update successful — device is restarting…');
                } else {
                    setStatus('info', 'Upload finished but no confirmation received.');
                }

            } catch (error) {
                if (!updateComplete) {
                    progressWrap.classList.remove('visible');
                    setStatus('error', `Upload failed: ${error.message}`);
                } else {
                    updateProgress(100, 'Upload complete');
                    setStatus('success', finalMessage || 'Update successful — device is restarting…');
                }
            } finally {
                uploadBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
